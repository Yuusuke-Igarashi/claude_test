<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>災害情報マップ</title>
  <!-- Leaflet (地図描画ライブラリ) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="title-group">
      <h1>🗺️ 災害情報マップ</h1>
      <p class="subtitle">Web上の災害情報を収集し、地図上にピンで表示します</p>
    </div>
    <div class="controls">
      <div class="region-toggle" role="group" aria-label="表示範囲の切り替え">
        <button id="regionJapan" class="region-btn is-active" data-region="japan">🇯🇵 日本版</button>
        <button id="regionWorld" class="region-btn" data-region="world">🌏 世界版</button>
      </div>
      <label class="filter">
        種別:
        <select id="typeFilter">
          <option value="all">すべて</option>
        </select>
      </label>
      <button id="refreshBtn" title="最新情報を再取得">🔄 更新</button>
    </div>
  </header>

  <div id="statusBar" class="status-bar">読み込み中…</div>

  <main id="map" aria-label="災害情報マップ"></main>

  <!-- ピンにホバーした際に詳細を表示する「別ウィンドウ」 -->
  <aside id="detailWindow" class="detail-window hidden" role="dialog" aria-live="polite">
    <div class="detail-header">
      <span id="detailBadge" class="badge">情報</span>
      <button id="detailClose" class="detail-close" title="閉じる" aria-label="閉じる">×</button>
    </div>
    <h2 id="detailTitle" class="detail-title"></h2>
    <dl class="detail-body">
      <div class="row"><dt>種別</dt><dd id="detailType"></dd></div>
      <div class="row"><dt>場所</dt><dd id="detailPlace"></dd></div>
      <div class="row"><dt>規模</dt><dd id="detailMag"></dd></div>
      <div class="row"><dt>発生時刻</dt><dd id="detailTime"></dd></div>
      <div class="row"><dt>座標</dt><dd id="detailCoord"></dd></div>
      <div class="row"><dt>情報源</dt><dd id="detailSource"></dd></div>
    </dl>
    <p id="detailDesc" class="detail-desc"></p>
    <a id="detailLink" class="detail-link" href="#" target="_blank" rel="noopener">詳細を見る ↗</a>
  </aside>

  <footer class="legend">
    <span class="legend-title">警戒度:</span>
    <span class="legend-item"><i class="dot sev-1"></i>低</span>
    <span class="legend-item"><i class="dot sev-2"></i>中</span>
    <span class="legend-item"><i class="dot sev-3"></i>高</span>
    <span class="legend-item"><i class="dot sev-4"></i>甚大</span>
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- 静的ホスティング時にブラウザから直接収集するためのフォールバック -->
  <script src="sample-data.js"></script>
  <script src="collector-client.js"></script>
  <script src="app.js"></script>
</body>
</html>
