name: Deploy to GitHub Pages

# public/ ディレクトリを静的サイトとして GitHub Pages に公開する。
# 有効化手順: リポジトリの Settings > Pages > Build and deployment の
# Source を "GitHub Actions" に設定するだけ。以後、main への push で自動公開。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（公開の取りこぼしを防ぐ）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
